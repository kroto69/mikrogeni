services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genieacs-backend
    restart: unless-stopped
    working_dir: /data
    env_file:
      - .env
    environment:
      PORT: "1997"
    volumes:
      - backend_data:/data
    ports:
      - "1997:1997"

  nginx:
    image: nginx:1.27-alpine
    container_name: genieacs-backend-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  backend_data: